name: CI Java Pipeline

# 2.6: Configuration du déclenchement multi-branches
on:
  push:
    branches: 
      - main
      - 'feature/**'
  pull_request:
    branches: 
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      # 2.2: Installe java 8 sur l'agent
      - name: Set up JDK 8
        uses: actions/setup-java@v2
        with:
          java-version: '8'
          distribution: 'adopt'

      # 2.2: Compile notre application
      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots package

      # 2.3: Publie les résultats de test
      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action@v1
        if: always()
        with:
          files: target/**/*.xml
          
      # 2.4: Publie les fichiers présents dans le dossier target dans un build artifact
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v2.2.4
        with:
          name: my-app-1.0
          path: target/*

      # 2.5: Installe la commande docker sur l'agent
      - name: Install Docker
        uses: docker/setup-buildx-action@v1
        id: buildx
        with:
          install: true
          
      # 2.5: Build l'image Docker
      - name: Docker build
        run: |
          docker build .